services:

  identitydb:
    image: postgres:17-alpine
    container_name: identitydb
    restart: on-failure
    ports:
      - "${IDENTITY_DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${IDENTITY_DB_USER}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASS}
      POSTGRES_DB: ${IDENTITY_DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_DB_USER} -d ${IDENTITY_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - system

  catalogdb:
    image: postgres:17-alpine
    container_name: catalogdb
    restart: on-failure
    ports:
      - "${CATALOG_DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${CATALOG_DB_USER}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASS}
      POSTGRES_DB: ${CATALOG_DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - catalog_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER} -d ${CATALOG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - system

  productsdb:
    image: postgres:17-alpine
    container_name: productsdb
    restart: on-failure
    ports:
      - "${PRODUCTS_DB_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${PRODUCTS_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCTS_DB_PASS}
      POSTGRES_DB: ${PRODUCTS_DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - products_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCTS_DB_USER} -d ${PRODUCTS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - system

  threadsdb:
    image: postgres:17-alpine
    container_name: threadsdb
    restart: on-failure
    ports:
      - "${THREADS_DB_PORT:-5435}:5432"
    environment:
      POSTGRES_USER: ${THREADS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${THREADS_DB_PASS:-postgres}
      POSTGRES_DB: ${THREADS_DB_NAME:-threads_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - threads_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${THREADS_DB_USER:-postgres} -d ${THREADS_DB_NAME:-threads_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - system

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq
    restart: on-failure
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running", "-q"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - system

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - system

  minio_init:
    image: quay.io/minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 ${MINIO_USER} ${MINIO_PASS} &&
      mc mb -p local/${MINIO_BUCKET_IMAGES} || true &&
      mc mb -p local/${MINIO_BUCKET_MODELS} || true
      "
    networks:
      - system
  
  identity:
    build:
      context: ./identity
      dockerfile: Dockerfile
      x-bake:
        platforms: [linux/amd64, linux/arm64]
    image: ${DOCKER_REGISTRY:-}identity:latest
    container_name: identity
    restart: on-failure
    ports:
      - "${IDENTITY_PORT}:8080"
    environment:
      - DB_HOST=${IDENTITY_DB_HOST}
      - DB_PORT=5432
      - DB_NAME=${IDENTITY_DB_NAME}
      - DB_USER=${IDENTITY_DB_USER}
      - DB_PASS=${IDENTITY_DB_PASS}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      identitydb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - system

  catalog:
    build:
      context: ./catalog
      dockerfile: Dockerfile
      x-bake:
        platforms: [linux/amd64, linux/arm64]
    image: ${DOCKER_REGISTRY:-}catalog:latest
    container_name: catalog
    restart: on-failure
    ports:
      - "${CATALOG_PORT}:8080"
    environment:
      - DB_HOST=${CATALOG_DB_HOST}
      - DB_PORT=5432
      - DB_NAME=${CATALOG_DB_NAME}
      - DB_USER=${CATALOG_DB_USER}
      - DB_PASS=${CATALOG_DB_PASS}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - SERVER_PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PRODUCTS_SERVICE_URL=http://products:8080
    depends_on:
      catalogdb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started
      products:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - system

  products:
    build:
      context: ./products
      dockerfile: Dockerfile
      x-bake:
        platforms: [linux/amd64, linux/arm64]
    image: ${DOCKER_REGISTRY:-}products:latest
    container_name: products
    restart: on-failure
    ports:
      - "${PRODUCTS_PORT:-8084}:8080"
    environment:
      - DB_HOST=${PRODUCTS_DB_HOST}
      - DB_PORT=5432
      - DB_NAME=${PRODUCTS_DB_NAME}
      - DB_USER=${PRODUCTS_DB_USER}
      - DB_PASS=${PRODUCTS_DB_PASS}
      - SERVER_PORT=8080
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      productsdb:
        condition: service_healthy
      identity:
        condition: service_started
    networks:
      - system

  threads:
    build:
      context: ./threads
      dockerfile: Dockerfile
      x-bake:
        platforms: [linux/amd64, linux/arm64]
    image: ${DOCKER_REGISTRY:-}threads:latest
    container_name: threads
    restart: on-failure
    ports:
      - "${THREADS_PORT:-8085}:8080"
    environment:
      - DB_HOST=${THREADS_DB_HOST:-threadsdb}
      - DB_PORT=5432
      - DB_NAME=${THREADS_DB_NAME:-threads_db}
      - DB_USER=${THREADS_DB_USER:-postgres}
      - DB_PASS=${THREADS_DB_PASS:-postgres}
      - SERVER_PORT=8080
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      threadsdb:
        condition: service_healthy
      identity:
        condition: service_started
    networks:
      - system

  document:
    build:
      context: ./document
      dockerfile: Dockerfile
      x-bake:
        platforms: [linux/amd64, linux/arm64]
    image: ${DOCKER_REGISTRY:-}document:latest
    container_name: document
    restart: on-failure
    ports:
      - "${DOCUMENT_PORT}:8080"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT}
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASS=${MINIO_PASS}
      - MINIO_BUCKET_IMAGES=${MINIO_BUCKET_IMAGES}
      - MINIO_BUCKET_MODELS=${MINIO_BUCKET_MODELS}
      - JWT_SECRET=${JWT_SECRET}
      - IMAGES_PUBLIC_BASE_URL=${IMAGES_PUBLIC_BASE_URL:-http://localhost:8000/images}
      # El document no puede usar localhost:8000 (apunta a su propio contenedor). Usa caddy:8000.
      - IMAGES_INTERNAL_BASE_URL=${IMAGES_INTERNAL_BASE_URL:-http://caddy:8000/images}
    depends_on:
      - minio
      - minio_init
      - identity
      - catalog
      - products
    networks:
      - system

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: on-failure
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - system

  muma:
    build:
      context: ./muma-web
      dockerfile: Dockerfile
      x-bake:
        platforms: [linux/amd64, linux/arm64]
    image: ${DOCKER_REGISTRY:-}muma:latest
    ports:
      - "${MUMA_PORT}:8081"
    container_name: muma
    depends_on:
      - identity
      - catalog
      - document
    networks:
      - system

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - identity
      - catalog
      - document
      - products
      - threads
      - muma
    networks:
      - system
  
  metabasedb:
    image: postgres:17-alpine
    container_name: metabasedb
    restart: unless-stopped
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
      POSTGRES_DB: metabase
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - metabase_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d metabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - system


  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"

    environment:

      # URL pública
      MB_SITE_URL: http://localhost:8000

      # para servirlo en /analytics si usas Caddy
      MB_JETTY_CONTEXT_PATH: /analytics

      # DB interna de Metabase
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabasedb

      # opcional
      MB_ANON_TRACKING_ENABLED: "false"
      MB_ENABLE_PUBLIC_SHARING: "true"

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

    depends_on:
      metabasedb:
        condition: service_healthy
      catalogdb:
        condition: service_healthy

    networks:
      - system

  metabase-init:
    image: python:3-alpine
    container_name: metabase-init
    restart: "no"
    environment:
      METABASE_BASE: http://metabase:3000
      METABASE_ADMIN_1_EMAIL: ${METABASE_ADMIN_1_EMAIL:-admin@muma.local}
      METABASE_ADMIN_1_PASS: ${METABASE_ADMIN_1_PASS:-Muma.Admin2024!}
      METABASE_VIEWER_EMAIL: ${METABASE_VIEWER_EMAIL:-viewer@muma.local}
      METABASE_VIEWER_PASS: ${METABASE_VIEWER_PASS:-Muma.Viewer2024!}
      CATALOG_DB_HOST: ${CATALOG_DB_HOST:-catalogdb}
      # Puerto interno de Postgres en la red Docker (no el mapeo host)
      CATALOG_DB_PORT: 5432
      CATALOG_DB_USER: ${CATALOG_DB_USER:-postgres}
      CATALOG_DB_PASS: ${CATALOG_DB_PASS:-postgres123}
      CATALOG_DB_NAME: ${CATALOG_DB_NAME:-catalog_db}
      METABASE_QUERIES_DIR: /queries
    volumes:
      - ./metabase/init/metabase_init.py:/init.py
      - ./metabase/queries:/queries:ro
    entrypoint: ["python3", "/init.py"]
    depends_on:
      metabase:
        condition: service_healthy
    networks:
      - system

volumes:
  identity_data:
    name: identity_data
  catalog_data:
    name: catalog_data
  products_data:
    name: products_data
  threads_data:
    name: threads_data
  redis_data:
    name: redis_data
  rabbitmq_data:
    name: rabbitmq_data
  rabbitmq_logs:
    name: rabbitmq_logs
  minio_data:
    name: minio_data
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
  metabase_data:
    name: metabase_data

networks:
  system:
    driver: bridge
