name: CI/CD Build and Push to Docker Hub

on:
  push:
    branches:
      - master # Cambiado a master según tu repositorio

jobs:
  # Solo hace trabajo extra si en el push cambian migraciones Flyway (V{n}__*.sql).
  # Si no hay cambios en esos archivos, deja constancia en el summary y termina OK.
  flyway-migration-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect cambios en db/migration (Flyway)
        id: mig
        run: |
          set -e
          git fetch origin master 2>/dev/null || true
          if git rev-parse origin/master >/dev/null 2>&1; then
            BASE=$(git merge-base HEAD origin/master)
          else
            BASE="HEAD~1"
          fi
          AFTER="${{ github.sha }}"
          FILES=$(git diff --name-only "$BASE" "$AFTER" 2>/dev/null | grep -E 'db/migration/V[0-9]+__[^/]+\.sql$' || true)
          OTHER=$(git diff --name-only "$BASE" "$AFTER" 2>/dev/null | grep 'db/migration' | grep -v -E 'db/migration/V[0-9]+__[^/]+\.sql$' || true)
          if [ -n "$OTHER" ]; then
            echo "::warning::Archivos bajo db/migration sin patrón Flyway V{version}__nombre.sql:"
            echo "$OTHER"
          fi
          if [ -n "$FILES" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            {
              echo "### Migraciones Flyway detectadas en este push"
              echo ""
              echo "Se validará el build; al desplegar, el contenedor aplicará estas migraciones al arrancar."
              echo ""
              echo '```'
              echo "$FILES"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "$FILES"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            {
              echo "### Migraciones Flyway"
              echo ""
              echo "No hubo cambios en archivos db/migration/V*__*.sql respecto a la base de comparación. No hay pasos extra de migración en CI."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  build-and-push:
    needs: flyway-migration-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Instalar la CLI de Infisical
      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      # 2. Login Infisical (Universal Auth) y exportar variables
      - name: Get variables from Infisical
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_ENV: ${{ secrets.INFISICAL_ENV }}
        run: |
          if [ -z "$INFISICAL_CLIENT_ID" ] || [ -z "$INFISICAL_CLIENT_SECRET" ]; then
            echo "::error::Faltan secrets: INFISICAL_CLIENT_ID e INFISICAL_CLIENT_SECRET (GitHub Settings > Secrets)"
            exit 1
          fi
          export INFISICAL_TOKEN=$(infisical login --method=universal-auth --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" --silent --plain)
          source ./vars.sh
          # Solo vars que docker-compose build necesita (GITHUB_ENV no soporta multiline como PEM)
          env | grep -E '^(IDENTITY_|CATALOG_|PRODUCTS_|THREADS_|RABBITMQ_|MINIO_|JWT_|REDIS_|DOCUMENT_|IMAGES_|ADMIN_|METABASE_)' | sort -u >> $GITHUB_ENV

      # 3. QEMU + Buildx (VM OCI es ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Autenticación en Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Registry para push
      - name: Set Docker registry
        run: echo "DOCKER_REGISTRY=${{ secrets.DOCKERHUB_USERNAME }}/" >> $GITHUB_ENV

      # 6. Build multi-platform (amd64 + arm64) y push
      - name: Build and push Docker images
        run: |
          docker buildx bake -f docker-compose.yml --push