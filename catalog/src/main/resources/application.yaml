spring:
  application:
    name: catalog
  security:
    oauth2:
      resourceserver:
        jwt: {}  # JwtDecoder bean en JwtConfig usa JWT_SECRET
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

app:
  public-endpoint: ${PUBLIC_ENDPOINT}
  identity-service: ${IDENTITY_SERVICE}
  products-service-url: ${PRODUCTS_SERVICE_URL:-http://products:8080}

server:
  port: ${SERVER_PORT}

logging:
  level:
    org.hibernate.SQL: WARN
    root: INFO
